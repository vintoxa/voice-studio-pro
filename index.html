<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Studio Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0c0e14;
            --bg-mid: #141824;
            --surface: rgba(22, 26, 38, 0.72);
            --surface-solid: #1a1f2e;
            --surface-hover: #222838;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #eef1f8;
            --text-muted: #8b93a8;
            --accent: #ff5c7a;
            --accent-soft: rgba(255, 92, 122, 0.14);
            --accent-glow: rgba(255, 92, 122, 0.35);
            --success: #3ecf8e;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse 80% 60% at 10% -10%, rgba(255, 92, 122, 0.18), transparent 55%),
                radial-gradient(ellipse 60% 50% at 95% 100%, rgba(99, 102, 241, 0.12), transparent 50%),
                linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
            padding: 28px 20px 40px;
        }

        .app {
            width: min(1120px, 100%);
            margin: 0 auto;
            animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .brand {
            display: grid;
            gap: 6px;
        }

        .brand-eyebrow {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .title {
            margin: 0;
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 400;
            line-height: 1.05;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0;
            max-width: 42ch;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .status-pill::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px rgba(62, 207, 142, 0.6);
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .panel-settings {
            padding: 20px;
            display: grid;
            gap: 16px;
        }

        .panel-main {
            padding: 22px;
            display: grid;
            gap: 18px;
            min-height: 560px;
        }

        .section-title {
            margin: 0 0 4px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .control {
            display: grid;
            gap: 8px;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select,
        textarea,
        button,
        input[type="range"] {
            font-family: inherit;
            font-size: 0.95rem;
        }

        select,
        textarea {
            width: 100%;
            padding: 11px 13px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface-solid);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(255, 92, 122, 0.5);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.6;
        }

        #pageText {
            min-height: 280px;
            font-size: 1rem;
        }

        .switch-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: var(--surface-solid);
            border: 1px solid var(--border);
        }

        .switch-label {
            font-weight: 600;
            font-size: 0.92rem;
        }

        .ios-switch {
            position: relative;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }

        .ios-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #3a4052;
            transition: 0.25s;
            border-radius: 99px;
        }

        .slider::before {
            position: absolute;
            content: '';
            height: 22px;
            width: 22px;
            left: 3px;
            top: 3px;
            background: #fff;
            transition: 0.25s;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .ios-switch input:checked + .slider {
            background: linear-gradient(120deg, #ff7a93, var(--accent));
        }

        .ios-switch input:checked + .slider::before {
            transform: translateX(22px);
        }

        .source-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 4px;
            border-radius: var(--radius-sm);
            background: var(--surface-solid);
            border: 1px solid var(--border);
            gap: 4px;
        }

        .source-toggle input {
            display: none;
        }

        .source-toggle label {
            padding: 9px 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .source-toggle input:checked + label {
            background: var(--accent-soft);
            color: #ffb8c6;
            border: 1px solid rgba(255, 92, 122, 0.25);
        }

        .muted {
            color: var(--text-muted);
            font-size: 0.82rem;
            line-height: 1.45;
        }

        .range-wrap {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface-solid);
            border: 1px solid var(--border);
        }

        #speechRateValue {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--accent);
            min-width: 3.2rem;
            text-align: right;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .actions {
            display: grid;
            gap: 10px;
        }

        .btn {
            border: 0;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b86, #e84362);
            color: #fff;
            box-shadow: 0 10px 28px var(--accent-glow);
        }

        .btn-primary.is-recording {
            animation: recordPulse 1.6s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 10px 28px var(--accent-glow); }
            50% { box-shadow: 0 10px 36px rgba(255, 92, 122, 0.55), 0 0 0 6px rgba(255, 92, 122, 0.12); }
        }

        .btn-secondary {
            background: var(--surface-solid);
            color: var(--text);
            border: 1px solid var(--border-strong);
        }

        .btn-secondary.is-speaking {
            background: linear-gradient(135deg, #ff6b86, #e84362);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 28px var(--accent-glow);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .visualizer-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a0c12;
        }

        .visualizer-label {
            position: absolute;
            top: 12px;
            left: 14px;
            z-index: 1;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        #timbreCanvas {
            display: block;
            width: 100%;
            height: 140px;
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .stat-chip {
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .panel-main {
                min-height: auto;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px 12px 28px;
            }

            .btn-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div id="status" class="status-pill">Ready</div>
        </header>

        <div class="layout">
            <aside class="panel panel-settings">
                <h2 class="section-title">Settings</h2>

                <div class="switch-card">
                    <span class="switch-label">Translation Mode</span>
                    <label class="ios-switch" aria-label="Translation mode">
                        <input type="checkbox" id="translationToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control" id="sourceLanguageControl">
                    <span class="label">Recognition Language</span>
                    <select id="sourceLanguage">
                        <option value="ar">Arabic</option>
                        <option value="bg">Bulgarian</option>
                        <option value="cs">Czech</option>
                        <option value="da">Danish</option>
                        <option value="de">German</option>
                        <option value="el">Greek</option>
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="et">Estonian</option>
                        <option value="fi">Finnish</option>
                        <option value="fr">French</option>
                        <option value="hu">Hungarian</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="lv">Latvian</option>
                        <option value="lt">Lithuanian</option>
                        <option value="nl">Dutch</option>
                        <option value="nb">Norwegian</option>
                        <option value="pl">Polish</option>
                        <option value="pt">Portuguese</option>
                        <option value="ro">Romanian</option>
                        <option value="ru">Russian</option>
                        <option value="sk">Slovak</option>
                        <option value="sl">Slovenian</option>
                        <option value="sv">Swedish</option>
                        <option value="tr">Turkish</option>
                        <option value="uk">Ukrainian</option>
                        <option value="zh">Chinese (Simplified)</option>
                    </select>
                </div>

                <div class="control hidden" id="targetLanguageControl">
                    <span class="label">Speech / Translation Language</span>
                    <select id="targetLanguage">
                        <option value="ar">Arabic</option>
                        <option value="bg">Bulgarian</option>
                        <option value="cs">Czech</option>
                        <option value="da">Danish</option>
                        <option value="de">German</option>
                        <option value="el">Greek</option>
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="et">Estonian</option>
                        <option value="fi">Finnish</option>
                        <option value="fr">French</option>
                        <option value="hu">Hungarian</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="lv">Latvian</option>
                        <option value="lt">Lithuanian</option>
                        <option value="nl">Dutch</option>
                        <option value="nb">Norwegian</option>
                        <option value="pl">Polish</option>
                        <option value="pt">Portuguese</option>
                        <option value="ro">Romanian</option>
                        <option value="ru">Russian</option>
                        <option value="sk">Slovak</option>
                        <option value="sl">Slovenian</option>
                        <option value="sv">Swedish</option>
                        <option value="tr">Turkish</option>
                        <option value="uk">Ukrainian</option>
                        <option value="zh">Chinese (Simplified)</option>
                    </select>
                </div>

                <div class="control">
                    <span class="label">Recording Source</span>
                    <div class="source-toggle">
                        <input type="radio" id="sourceMic" name="captureSource" value="mic" checked>
                        <label for="sourceMic">Microphone</label>
                        <input type="radio" id="sourceSystem" name="captureSource" value="system">
                        <label for="sourceSystem">Computer</label>
                    </div>
                    <small class="muted">For PC audio, choose Entire Screen and enable system audio in the browser picker.</small>
                </div>

                <div class="control">
                    <span class="label">Speech Rate</span>
                    <div class="range-wrap">
                        <input type="range" id="speechRate" min="0.7" max="1.3" step="0.05" value="1">
                        <span id="speechRateValue">1.00x</span>
                    </div>
                </div>

                <div class="actions">
                    <button id="startRecording" class="btn btn-primary">Start Recording</button>
                    <button id="processTextAudio" class="btn btn-secondary">Speak Text</button>
                    <div class="btn-row">
                        <button id="copyText" class="btn btn-ghost">Copy</button>
                        <button id="downloadText" class="btn btn-ghost">Export TXT</button>
                    </div>
                    <button id="downloadMp3" class="btn btn-ghost">Download MP3</button>
                </div>
            </aside>

            <section class="panel panel-main">
                <div class="visualizer-card">
                    <span class="visualizer-label">Voice Waveform</span>
                    <canvas id="timbreCanvas" width="980" height="140"></canvas>
                </div>

                <div class="control">
                    <div class="transcript-header">
                        <span class="label">Text</span>
                        <div class="stats">
                            <span id="charCount" class="stat-chip">Characters: 0</span>
                            <span id="wordCount" class="stat-chip">Words: 0</span>
                        </div>
                    </div>
                    <textarea id="pageText" placeholder="Recognized text appears here. You can edit it manually."></textarea>
                </div>

                <div class="control hidden" id="translationResultControl">
                    <span class="label">Translation</span>
                    <textarea id="translatedText" readonly placeholder="Translation will appear here…"></textarea>
                </div>
            </section>
        </div>
    </main>

    <script>
        window.VOICE_API_BASE = window.VOICE_API_BASE || '';
    </script>
    <script src="script.js"></script>
</body>
</html>
